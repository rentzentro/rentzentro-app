    <text x="92" y="106" fill="#7DD3FC" font-size="40" font-weight="700" font-family="Inter,Arial,sans-serif">RENZENTRO</text>
  </g>

  <text x="64" y="250" fill="#FFFFFF" font-size="104" font-weight="800" font-family="Inter,Arial,sans-serif">Fill Rentals</text>
  <text x="64" y="345" fill="#FFFFFF" font-size="104" font-weight="800" font-family="Inter,Arial,sans-serif">Faster.</text>

  <text x="64" y="424" fill="#DCE9F8" font-size="42" font-weight="500" font-family="Inter,Arial,sans-serif">All-in-one platform for modern landlords:</text>
  <text x="64" y="476" fill="#DCE9F8" font-size="42" font-weight="500" font-family="Inter,Arial,sans-serif">listings, payments, and maintenance.</text>

  <g filter="url(#shadow)">
    <rect x="64" y="560" width="952" height="96" rx="24" fill="#111827" fill-opacity="0.9" stroke="#334155"/>
    <text x="112" y="621" fill="#F8FAFC" font-size="36" font-weight="600" font-family="Inter,Arial,sans-serif">⚡ Post listings in minutes</text>

    <rect x="64" y="682" width="952" height="96" rx="24" fill="#111827" fill-opacity="0.9" stroke="#334155"/>
    <text x="112" y="743" fill="#F8FAFC" font-size="36" font-weight="600" font-family="Inter,Arial,sans-serif">💳 Collect rent automatically</text>

    <rect x="64" y="804" width="952" height="96" rx="24" fill="#111827" fill-opacity="0.9" stroke="#334155"/>
    <text x="112" y="865" fill="#F8FAFC" font-size="36" font-weight="600" font-family="Inter,Arial,sans-serif">🛠️ Track maintenance requests</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="64" y="978" width="590" height="114" rx="30" fill="#10B981"/>
    <text x="104" y="1048" fill="#FFFFFF" font-size="48" font-weight="800" font-family="Inter,Arial,sans-serif">Start Free Today →</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="676" y="968" width="340" height="156" rx="28" fill="#1E293B" stroke="#64748B"/>
    <text x="710" y="1030" fill="#E2E8F0" font-size="34" font-weight="700" font-family="Inter,Arial,sans-serif">Trusted by</text>
    <text x="710" y="1070" fill="#E2E8F0" font-size="34" font-weight="700" font-family="Inter,Arial,sans-serif">Property Owners</text>
  </g>

  <text x="64" y="1248" fill="#9FB3C8" font-size="28" font-weight="500" font-family="Inter,Arial,sans-serif">Built for independent landlords and growing property teams.</text>
